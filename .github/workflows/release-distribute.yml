name: Distribute Release Assets

# Triggered after a GitHub Release is officially published.
# Mirrors installer assets to the configured distribution endpoint for external download.
#
# Why `published` (not `released`)?
#   - `released` is supposed to fire when a non-prerelease release is published,
#     but GitHub sometimes only emits `published` (not `released`) when a pre-existing
#     draft is publicly released, causing the workflow to be silently skipped.
#   - `published` reliably fires on every draft â†’ public transition, including
#     prereleases. The `if` guard on the job filters out prereleases explicitly.
#
# All credentials / identifiers are read from repository secrets:
#   - AWS_REGION
#   - AWS_ROLE_ARN
#   - AWS_S3_BUCKET
# Do NOT hardcode these values in this file.

on:
  release:
    types: [published]
  # Manual trigger for smoke testing or for retrying a missed release:
  # pick any existing release tag to re-run the distribution against.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to redistribute (e.g. v1.9.21)'
        required: true
        type: string
      publish_latest:
        description: 'Also update the floating latest GHCR tag during manual dispatch'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write # required for OIDC token
  contents: read
  packages: write

jobs:
  distribute:
    name: Distribute release assets
    runs-on: ubuntu-latest
    # Skip prereleases: manual dispatch always runs, automatic event runs only when not a prerelease.
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    steps:
      - name: Extract version from tag
        id: version
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided (event did not supply one)."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG / Version: $VERSION"

      - name: Detect AWS distribution configuration
        id: aws
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          if [ -n "$AWS_ROLE_ARN" ] && [ -n "$AWS_REGION" ] && [ -n "$AWS_S3_BUCKET" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "AWS distribution secrets are not configured; skipping S3 asset distribution for this repository."

      - name: Configure AWS credentials (OIDC)
        if: steps.aws.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Guard against same-version overwrite
        if: steps.aws.outputs.enabled == 'true'
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DEST="s3://${S3_BUCKET}/releases/${VERSION}/"
          COUNT=$(aws s3 ls "$DEST" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Version directory already contains $COUNT file(s). Refusing to overwrite."
            echo "::error::Same-version re-publish is not allowed (downstream caches would serve stale files). Release a new version instead."
            aws s3 ls "$DEST"
            exit 1
          fi

      - name: Download release assets from GitHub
        if: steps.aws.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "*.dmg" \
            --pattern "*.exe" \
            --pattern "*.msi" \
            --pattern "*.deb" \
            --pattern "*.zip"
          echo "Downloaded files:"
          ls -la dist

      - name: Upload assets
        if: steps.aws.outputs.enabled == 'true'
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          aws s3 cp dist/ "s3://${S3_BUCKET}/releases/${VERSION}/" --recursive
          echo "Uploaded release ${VERSION}"

      - name: Summary
        if: steps.aws.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "### Release assets distributed"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Version: \`${VERSION}\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: steps.aws.outputs.enabled != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          {
            echo "### Release asset distribution skipped"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Reason: AWS distribution secrets are not configured for this repository."
          } >> $GITHUB_STEP_SUMMARY

  publish-container:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    steps:
      - name: Extract version from tag
        id: version
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [ -z "$TAG" ]; then
            echo "::error::No tag provided (event did not supply one)."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG / Version: $VERSION"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Resolve image coordinates
        id: image
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/cubecloud-agentos" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard against same-version overwrite
        id: guard
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VERSION: ${{ steps.version.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          if docker buildx imagetools inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
            echo "version_exists=true" >> $GITHUB_OUTPUT
            if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$PUBLISH_LATEST" = "true" ]; then
              echo "Container tag ${IMAGE}:${VERSION} already exists. Reusing it and updating latest only."
              exit 0
            fi
            echo "::error::Container tag ${IMAGE}:${VERSION} already exists. Refusing to overwrite."
            exit 1
          fi
          echo "version_exists=false" >> $GITHUB_OUTPUT

      - name: Resolve container tags
        id: tags
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VERSION: ${{ steps.version.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
          VERSION_EXISTS: ${{ steps.guard.outputs.version_exists }}
        run: |
          TAGS="${IMAGE}:${VERSION}"
          if [ "$VERSION_EXISTS" = "false" ] && { [ "$EVENT_NAME" = "release" ] || [ "$PUBLISH_LATEST" = "true" ]; }; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Capture release revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push container image
        if: steps.guard.outputs.version_exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=cubecloud AgentOS
            org.opencontainers.image.description=cubecloud ć™şć–ąäş‘ AgentOS standalone server image powered by AionUi
            org.opencontainers.image.vendor=cubecloud
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Point latest at released image
        if: steps.guard.outputs.version_exists == 'true' && (github.event_name == 'release' || github.event.inputs.publish_latest == 'true')
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}"

      - name: Summary
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          VERSION: ${{ steps.version.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_LATEST: ${{ github.event.inputs.publish_latest }}
        run: |
          {
            echo "### GHCR image published"
            echo ""
            echo "- Image: \`${IMAGE}:${VERSION}\`"
            if [ "$EVENT_NAME" = "release" ] || [ "$PUBLISH_LATEST" = "true" ]; then
              echo "- Floating tag: \`${IMAGE}:latest\`"
            fi
          } >> $GITHUB_STEP_SUMMARY
