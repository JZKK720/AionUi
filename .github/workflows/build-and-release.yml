name: Build and Release

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: write

on:
  push:
    branches: [main]

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  build-pipeline:
    name: Build Pipeline
    uses: ./.github/workflows/_build-reusable.yml
    # main 分支负责 fork 的正式构建与发布
    if: github.ref == 'refs/heads/main'
    with:
      matrix: >-
        {"include":[
          {"platform":"macos-arm64","os":"macos-14","command":"node scripts/build-with-builder.js arm64 --mac --arm64","artifact-name":"macos-build-arm64","arch":"arm64"},
          {"platform":"macos-x64","os":"macos-14","command":"node scripts/build-with-builder.js x64 --mac --x64","artifact-name":"macos-build-x64","arch":"x64"},
          {"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"windows-build-x64","arch":"x64"},
          {"platform":"windows-arm64","os":"windows-2022","command":"node scripts/build-with-builder.js arm64 --win --arm64","artifact-name":"windows-build-arm64","arch":"arm64"},
          {"platform":"linux-x64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js x64 --linux --x64","artifact-name":"linux-build-x64","arch":"x64"},
          {"platform":"linux-arm64","os":"ubuntu-latest","command":"node scripts/build-with-builder.js arm64 --linux --arm64","artifact-name":"linux-build-arm64","arch":"arm64"}
        ]}
    secrets: inherit

  # 自动重试 workflow（当构建失败时）
  auto-retry-workflow:
    name: Auto Retry on Build Failure
    runs-on: ubuntu-latest
    needs: build-pipeline
    # 关键：只在首次失败时触发，避免无限循环
    if: |
      failure() &&
      github.run_attempt == 1 &&
      (github.event_name == 'push' || github.event_name == 'schedule')

    steps:
      - name: Log retry information
        run: |
          echo "=========================================="
          echo "🔄 Auto retry triggered (first failure)"
          echo "=========================================="
          echo "Build failed on first attempt, preparing auto retry..."
          echo "Current attempt: ${{ github.run_attempt }}"
          echo "Wait strategy: 5 minutes cooldown before retry"
          echo "=========================================="

      - name: Wait before retry (5 min cooldown)
        run: |
          echo "⏳ Waiting 5 minutes before retry..."
          echo "Start: $(date)"
          sleep 300
          echo "End: $(date)"
          echo "Triggering retry..."

      - name: Trigger workflow rerun
        run: |
          echo "🔄 Triggering full workflow rerun (attempt 2)..."

          # Use re-run API (not rerun-failed-jobs, to avoid loops)
          response=$(curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -w "\n%{http_code}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun)

          http_code=$(echo "$response" | tail -n1)

          if [ "$http_code" = "201" ]; then
            echo ""
            echo "✅ Retry triggered successfully"
            echo "This will be attempt 2"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo ""
            echo "❌ Retry trigger failed, HTTP status: $http_code"
            echo "Response:"
            echo "$response" | head -n-1
            exit 1
          fi

  # 自动创建正式 tag（仅 main 分支推送时）
  create-tag:
    name: Create Tag from Main
    runs-on: ubuntu-latest
    needs: [build-pipeline]
    if: success() && github.ref == 'refs/heads/main'
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create and push tag
        id: create_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH_NAME=${GITHUB_REF#refs/heads/}

          TAG_NAME="v$VERSION"
          echo "🚀 Main release: $TAG_NAME"

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # 检查远程tag是否已存在
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME$"; then
            echo "⚠️ Tag $TAG_NAME already exists, auto-incrementing version..."

            if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}
              MINOR=${BASH_REMATCH[2]}
              PATCH=${BASH_REMATCH[3]}
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

              echo "📝 Updating package.json version to $NEW_VERSION"

              # 更新 package.json 版本号
              bun pm version $NEW_VERSION

              # 配置git用户信息
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"

              # 提交版本更新
              git add package.json bun.lock
              git commit -m "chore: bump version to $NEW_VERSION"
              git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
              git push origin $BRANCH_NAME

              TAG_NAME="v${NEW_VERSION}"

              echo "🚀 New tag after version bump: $TAG_NAME"
              echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            else
              echo "::error::Expected a stable semver version in package.json, got $VERSION"
              exit 1
            fi
          fi

          # 配置git用户信息（如果前面没配置）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 创建并推送tag
          echo "Creating tag: $TAG_NAME"
          git tag $TAG_NAME
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin $TAG_NAME
          echo "✅ Successfully created and pushed tag: $TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # 发布到 GitHub Releases
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-pipeline, create-tag]
    if: needs.build-pipeline.result == 'success' && needs.create-tag.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version for release
        id: version
        run: |
          TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
          echo "🚀 Creating release from main: $TAG_NAME"

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build-artifacts

      - name: Prepare release assets (normalize updater metadata)
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.zip
            release-assets/**/*.yml
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'rc') }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
