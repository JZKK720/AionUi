name: Build and Release

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: write

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  build-pipeline:
    name: Build Pipeline
    uses: ./.github/workflows/_build-reusable.yml
    needs: [create-tag]
    # main 分支负责 fork 的正式构建与发布
    if: github.ref == 'refs/heads/main' && needs.create-tag.result == 'success'
    with:
      ref: refs/tags/${{ needs.create-tag.outputs.tag_name }}
      matrix: >-
        {"include":[
          {"platform":"windows-x64","os":"windows-2022","command":"node scripts/build-with-builder.js x64 --win --x64","artifact-name":"windows-build-x64","arch":"x64"}
        ]}
    secrets: inherit

  # 自动重试 workflow（当构建失败时）
  auto-retry-workflow:
    name: Auto Retry on Build Failure
    runs-on: ubuntu-latest
    needs: build-pipeline
    # 关键：只在首次失败时触发，避免无限循环
    if: |
      failure() &&
      github.run_attempt == 1 &&
      (github.event_name == 'push' || github.event_name == 'schedule')

    steps:
      - name: Log retry information
        run: |
          echo "=========================================="
          echo "🔄 Auto retry triggered (first failure)"
          echo "=========================================="
          echo "Build failed on first attempt, preparing auto retry..."
          echo "Current attempt: ${{ github.run_attempt }}"
          echo "Wait strategy: 5 minutes cooldown before retry"
          echo "=========================================="

      - name: Wait before retry (5 min cooldown)
        run: |
          echo "⏳ Waiting 5 minutes before retry..."
          echo "Start: $(date)"
          sleep 300
          echo "End: $(date)"
          echo "Triggering retry..."

      - name: Trigger workflow rerun
        run: |
          echo "🔄 Triggering full workflow rerun (attempt 2)..."

          # Use re-run API (not rerun-failed-jobs, to avoid loops)
          response=$(curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -w "\n%{http_code}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun)

          http_code=$(echo "$response" | tail -n1)

          if [ "$http_code" = "201" ]; then
            echo ""
            echo "✅ Retry triggered successfully"
            echo "This will be attempt 2"
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo ""
            echo "❌ Retry trigger failed, HTTP status: $http_code"
            echo "Response:"
            echo "$response" | head -n-1
            exit 1
          fi

  # 自动创建正式 tag（仅 main 分支推送时）
  create-tag:
    name: Create Tag from Main
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create and push tag
        id: create_tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ORIGINAL_VERSION="$VERSION"
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          HEAD_SHA=$(git rev-parse HEAD)

          resolve_remote_tag_sha() {
            local tag_name="$1"
            git ls-remote --tags origin "refs/tags/${tag_name}" | awk '!/\^\{\}$/ { print $1; exit }'
          }

          next_patch_version() {
            local version="$1"

            if [[ ! $version =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::Expected a stable semver version in package.json, got $version"
              exit 1
            fi

            local major=${BASH_REMATCH[1]}
            local minor=${BASH_REMATCH[2]}
            local patch=${BASH_REMATCH[3]}
            printf '%s\n' "${major}.${minor}.$((patch + 1))"
          }

          TAG_NAME="v$VERSION"
          echo "🚀 Main release: $TAG_NAME"

          REMOTE_TAG_SHA=$(resolve_remote_tag_sha "$TAG_NAME")

          if [ -n "$REMOTE_TAG_SHA" ] && [ "$REMOTE_TAG_SHA" = "$HEAD_SHA" ]; then
            echo "ℹ️ Tag $TAG_NAME already points to HEAD ($HEAD_SHA), reusing it for this rerun"
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            exit 0
          fi

          while [ -n "$REMOTE_TAG_SHA" ]; do
            echo "⚠️ Tag $TAG_NAME already exists on $REMOTE_TAG_SHA, incrementing patch version..."
            VERSION=$(next_patch_version "$VERSION")
            TAG_NAME="v$VERSION"
            REMOTE_TAG_SHA=$(resolve_remote_tag_sha "$TAG_NAME")
          done

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          if [ "$TAG_NAME" != "v$ORIGINAL_VERSION" ]; then
            echo "📝 Updating package.json version to $VERSION"

            # 更新 package.json 版本号，避免 bun pm version 隐式执行 git commit/tag
            bun pm pkg set version="$VERSION"

            # 配置git用户信息
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # 提交版本更新
            git add package.json bun.lock

            if ! git diff --cached --quiet; then
              git commit -m "chore: bump version to $VERSION"
              git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
              git push origin $BRANCH_NAME
              HEAD_SHA=$(git rev-parse HEAD)
            fi

            echo "🚀 New tag after version bump: $TAG_NAME"
          fi

          # 配置git用户信息（如果前面没配置）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 创建并推送tag
          echo "Creating tag: $TAG_NAME"
          git tag $TAG_NAME
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git push origin $TAG_NAME
          echo "✅ Successfully created and pushed tag: $TAG_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

  # 发布到 GitHub Releases
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-pipeline, create-tag]
    if: needs.build-pipeline.result == 'success' && needs.create-tag.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.create-tag.outputs.tag_name }}

      - name: Get version for release
        id: version
        run: |
          TAG_NAME="${{ needs.create-tag.outputs.tag_name }}"
          echo "🚀 Creating release from main: $TAG_NAME"

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: build-artifacts

      - name: Prepare release assets (normalize updater metadata)
        shell: bash
        run: bash scripts/prepare-release-assets.sh build-artifacts release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.tag_name }}
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.zip
            release-assets/**/*.yml
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'rc') }}
        env:
          GH_TOKEN: ${{ github.token }}
